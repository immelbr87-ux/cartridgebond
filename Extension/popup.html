<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartridgeBond</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 280px;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #0d2318;
    color: white;
    min-height: 180px;
  }

  .header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid rgba(34,197,94,0.2);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(34,197,94,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(34,197,94,0.07) 1px,transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }
  .brand {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    position: relative;
  }
  .brand .bond { color: #22c55e; }
  .tagline {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: .06em;
    margin-top: 3px;
    position: relative;
  }

  .body { padding: 14px 16px; }

  .status {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 14px;
    text-align: center;
  }

  .status .highlight {
    color: #22c55e;
    font-weight: 700;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: #16a34a;
    color: white;
    text-decoration: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .btn:hover { background: #14532d; }
  .btn-outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.35); background: transparent; color: white; }

  .footer {
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand"><strong>Cartridge</strong><span class="bond"><strong>Bond</strong></span></div>
  <div class="tagline">Local Nintendo Switch Game Trades — Milwaukee, WI</div>
</div>

<div class="body">
  <div class="status" id="status">
    Browse any Nintendo Switch game on Amazon, GameStop, Best Buy, Target, or Walmart to see if a local buyer or seller is waiting on CartridgeBond.
  </div>
  <a href="https://cartridgebond.com" target="_blank" class="btn">Go to CartridgeBond</a>
  <a href="https://cartridgebond.com/prices.html" target="_blank" class="btn btn-outline">See Price Guide</a>
</div>

<div class="footer">
  Milwaukee &amp; North Shore &bull; Free beta
</div>

</body>
</html>
